name: Release

# Publishes a signed Gl0rgTV.apk to a GitHub Release so the in-app updater
# (Settings -> Check Update) can install it over-the-air. The APK is signed with
# the project's release keystore (provided via repo secrets) so its signature
# matches existing installs.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing KEYSTORE_BASE64 secret. Add the signing secrets to enable OTA releases."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          GL0RG_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          GL0RG_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          GL0RG_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GL0RG_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Stage APK as Gl0rgTV.apk
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/Gl0rgTV.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: out/Gl0rgTV.apk
